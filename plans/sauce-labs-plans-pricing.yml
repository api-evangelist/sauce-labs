    name: Virtual Device Cloud
    type: paid
    description: >-
      All Live Testing features plus unlimited automated testing minutes, visual
      testing with 500 monthly snapshots, and scalable to 1–24 concurrent
      sessions. Supports automated frameworks with virtual browsers and
      emulators/simulators.
    entries:
      - label: Parallel Tests
        name: parallel_tests
        type: quota
        metric: concurrent sessions
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$149'
        userMultiplied: false
