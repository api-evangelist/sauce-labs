description: >-
  Sauce Labs offers tiered plans for Live Testing, Virtual Device Cloud, and
  Real Device Cloud. Pricing is available on annual or monthly billing, with
  enterprise plans available for large-scale and custom deployments. Add-on
  products include Sauce Mobile App Distribution and Sauce Error Reporting.
sources:
  - https://saucelabs.com/pricing
plans:
  - id: sauce-labs-live-testing
    name: Live Testing
    type: paid
    description: >-
      Access to live interactive browser and mobile testing on thousands of
      desktop browsers and mobile emulators/simulators. Includes 1 parallel
      test, unlimited users, unlimited testing minutes, secure local tunneling,
      debugging tools, videos, screenshots, and REST API access.
    entries:
      - label: Parallel Tests
        name: parallel_tests
        type: quota
        metric: concurrent sessions
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$39'
        userMultiplied: false
      - label: Desktop Browsers Access
        name: desktop_browsers
        type: boolean
        metric: feature
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0'
